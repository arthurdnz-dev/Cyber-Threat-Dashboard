<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cyber Threat Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1 class="title">CYBER THREAT MONITOR</h1>

        <div class="dashboard">

            <div class="card">
                <h2>Threat Logs</h2>
                <div id="logs"></div>
            </div>

            <div class="card">
                <h2>Active Threat Level</h2>
                <p id="threatLevel">LOW</p>
            </div>

            <div class="card">
                <h2>Total Attacks</h2>
                <p id="attackCount">0</p>
            </div>
            <div class="card">
            <h2>Attack Activity</h2>
            <canvas id="attackChart"></canvas>
</div>

        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
